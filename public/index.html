<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VCard Maker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
  <div class="grid md:grid-cols-2 gap-8 w-full max-w-5xl">
    <!-- FORM -->
    <div class="bg-white p-6 rounded-3xl shadow-xl">
      <h1 class="text-3xl font-bold mb-6">VCard Generator</h1>
      <div class="space-y-4">
        <input id="name" type="text" placeholder="Full Name"
          class="w-full border p-3 rounded-xl">
        <input id="title" type="text" placeholder="Job Title"
          class="w-full border p-3 rounded-xl">
        <input id="phone" type="text" placeholder="Phone"
          class="w-full border p-3 rounded-xl">
        <input id="email" type="email" placeholder="Email"
          class="w-full border p-3 rounded-xl">
        <input id="website" type="text" placeholder="Website"
          class="w-full border p-3 rounded-xl">
        <input id="image" type="file"
          class="w-full border p-3 rounded-xl">
      </div>
    </div>
    <!-- CARD PREVIEW -->
    <div id="card"
      class="bg-gradient-to-br from-black to-gray-800 text-white rounded-3xl p-8 shadow-2xl relative overflow-hidden">
      <div class="flex items-center gap-4">
        <img id="previewImage"
          src="https://via.placeholder.com/100"
          class="w-24 h-24 rounded-full object-cover border-4 border-white">
        <div>
          <h2 id="previewName" class="text-3xl font-bold">
            Your Name
          </h2>
          <p id="previewTitle" class="text-gray-300">
            Job Title
          </p>
        </div>
      </div>
      <div class="mt-8 space-y-2 text-lg">
        <p id="previewPhone">📞 Phone</p>
        <p id="previewEmail">✉ Email</p>
        <p id="previewWebsite">🌐 Website</p>
      </div>
      <div id="qrcode" class="bg-white p-2 rounded-xl w-fit mt-8"></div>
    </div>
  </div>
<script>
const nameInput = document.getElementById("name");
const titleInput = document.getElementById("title");
const phoneInput = document.getElementById("phone");
const emailInput = document.getElementById("email");
const websiteInput = document.getElementById("website");
const imageInput = document.getElementById("image");
function updateCard() {
  const name = nameInput.value || "Your Name";
  const title = titleInput.value || "Job Title";
  const phone = phoneInput.value || "Phone";
  const email = emailInput.value || "Email";
  const website = websiteInput.value || "Website";
  document.getElementById("previewName").innerText = name;
  document.getElementById("previewTitle").innerText = title;
  document.getElementById("previewPhone").innerText = "📞 " + phone;
  document.getElementById("previewEmail").innerText = "✉ " + email;
  document.getElementById("previewWebsite").innerText = "🌐 " + website;
  const vcard = `
BEGIN:VCARD
VERSION:3.0
FN:${name}
TITLE:${title}
TEL:${phone}
EMAIL:${email}
URL:${website}
END:VCARD
`;
  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), {
    text: vcard,
    width: 120,
    height: 120
  });
}
[nameInput, titleInput, phoneInput, emailInput, websiteInput]
.forEach(input => {
  input.addEventListener("input", updateCard);
});
imageInput.addEventListener("change", function(e) {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      document.getElementById("previewImage").src = event.target.result;
    };
    reader.readAsDataURL(file);
  }
});
updateCard();
</script>
</body>
</html>
