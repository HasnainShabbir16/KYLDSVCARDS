<script>
// ════ STATE ════
let ADM='admin123';
let cards=[];
let logs=JSON.parse(localStorage.getItem('kl')||'[]');
let brand=JSON.parse(localStorage.getItem('kb')||'{"name":"Kashmir Youth Literary and Debating Society","abbr":"KYLDS","tag":"Voices of the Valley","url":"view.html"}');
let photos={a:'',c:''};
let editId=null,curQR=null,mpwId=null;

function sv(){localStorage.setItem('kc',JSON.stringify(cards));}
const ini=n=>(n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();

// --- Fetch cards from backend ---
async function fetchCards(){
  try{
    const res = await fetch('/api/cards');
    if(!res.ok) throw new Error("API error: "+res.status);
    cards = await res.json();
    initDash();
    if(document.getElementById('p-members').classList.contains('active')) renderM(cards);
  }catch(e){
    toast('Failed to load cards from database','err');
    cards = [];
  }
}

// ════ AUTH (calls fetchCards) ════
function doLogin(){
  const u=document.getElementById('lu').value.trim();
  const p=document.getElementById('lp').value;
  if(u==='admin'&&p===ADM){
    document.getElementById('login-wrap').classList.add('gone');
    document.getElementById('app').classList.add('on');
    fetchCards(); // Always grab fresh DB cards after login
  } else {
    const e=document.getElementById('lerr');
    e.textContent='Invalid credentials.';
    document.getElementById('lp').classList.add('shake');
    setTimeout(()=>{e.textContent='';document.getElementById('lp').classList.remove('shake');},2000);
  }
}
function logout(){document.getElementById('app').classList.remove('on');document.getElementById('login-wrap').classList.remove('gone');document.getElementById('lp').value='';}

// ════ NAV ════
const ptitles={dashboard:'Dashboard',members:'All Members',create:'Create vCard',scans:'Scan Logs',branding:'Branding',settings:'Settings'};
function go(page,btn){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('p-'+page).classList.add('active');
  document.getElementById('pt').textContent=ptitles[page]||page;
  if(page==='members')renderM(cards);
  if(page==='scans')renderScans();
  if(page==='create'&&!editId)clearForm();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sbo').style.display='none';
}
function toggleSB(){
  const open=document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sbo').style.display=open?'block':'none';
}
// ════ DASHBOARD ════
function initDash(){
  document.getElementById('st').textContent=cards.length;
  document.getElementById('sa').textContent=cards.filter(c=>c.active).length;
  document.getElementById('ss').textContent=cards.reduce((s,c)=>s+(c.scans||0),0);
  document.getElementById('sv').textContent=Math.floor(Math.random()*10)+1;
  renderRecent();
  drawChart();
}
// ...rest of your script is unchanged...
// initial preview update
updPrev();
</script>
</body>
</html>
